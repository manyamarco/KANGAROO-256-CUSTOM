name: Build with CUDA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-universal:
    name: Universal CUDA Build (sm_75–90 + PTX)
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.4.1-devel-ubuntu22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -y
          apt-get install -y build-essential g++ make

      - name: Show CUDA version
        run: nvcc --version

      - name: Build universal binary (all architectures + PTX)
        run: |
          make gpu=1 multi=1

      - name: Show binary info
        run: |
          ls -lh kangaroo-256
          cuobjdump kangaroo-256 2>/dev/null | grep "arch\|sm_" || true

      - name: Upload universal binary
        uses: actions/upload-artifact@v4
        with:
          name: kangaroo-256-cuda-universal
          path: kangaroo-256
          if-no-files-found: error

  build-windows:
    name: Windows CUDA Build (sm_75–90 + PTX)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CUDA Toolkit 12.4
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '12.4.1'
          method: network
          sub-packages: '["nvcc", "cudart", "visual_studio_integration"]'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Copy CUDA BuildCustomizations to VS and patch vcxproj
        shell: pwsh
        run: |
          $cudaPath = $env:CUDA_PATH
          $src = "$cudaPath\extras\visual_studio_integration\MSBuildExtensions"

          # Find VS BuildCustomizations directory dynamically
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstallPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          Write-Host "VS install path: $vsInstallPath"

          # Copy to ALL VC\v* BuildCustomizations dirs found under VS install
          $bcDirs = Get-ChildItem "$vsInstallPath\MSBuild\Microsoft\VC" -Directory |
                    ForEach-Object { "$($_.FullName)\BuildCustomizations" }
          foreach ($dst in $bcDirs) {
            if (-not (Test-Path $dst)) { New-Item -ItemType Directory -Path $dst -Force | Out-Null }
            Write-Host "Copying to $dst"
            Copy-Item "$src\*" -Destination $dst -Force
          }

          # Detect actual installed CUDA props version (e.g. "CUDA 12.4")
          $propsFile = Get-ChildItem $dst -Filter "CUDA *.props" | Select-Object -First 1
          $cudaVer = $propsFile.BaseName
          Write-Host "Detected CUDA props version: $cudaVer"

          # Patch vcxproj to use detected version
          $vcxproj = "VC_CUDA118\Kangaroo.vcxproj"
          (Get-Content $vcxproj) -replace 'CUDA \d+\.\d+', $cudaVer | Set-Content $vcxproj
          Write-Host "Patched $vcxproj with: $cudaVer"

      - name: Build Release (universal CUDA)
        working-directory: VC_CUDA118
        run: |
          msbuild Kangaroo.sln /p:Configuration=Release /p:Platform=x64 /m /v:m

      - name: Rename binary
        run: |
          move VC_CUDA118\x64\Release\Kangaroo.exe kangaroo-256.exe

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: kangaroo-256-windows-cuda-universal
          path: kangaroo-256.exe
          if-no-files-found: error

  build-cpu:
    name: CPU-only Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential g++ make

      - name: Build CPU-optimized
        run: make clean && make cpu=1

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: kangaroo-256-cpu
          path: kangaroo-256
          if-no-files-found: error
